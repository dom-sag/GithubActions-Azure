name: Generate ASCII Artwork
on:
    push

jobs:
   ascii_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v6

    - name: List Repo Files
      run: ls -latr
    
    - name: Execute a Shell script
      run: |
        chmod +x scripts/ascii-script.sh
        .scripts/ascii-script.sh
    