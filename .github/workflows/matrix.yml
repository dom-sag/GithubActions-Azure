name: Matrix Configuration

on:
    push:
    workflow_dispatch:
jobs:
    Deploy-on-ubuntu:
        runs-on: ubuntu-latest
        steps:
        - name: Echo Docker Details
          run: docker info
        - name: Docker Images
          run: docker run hello-world
    Deploy-on-windows:
        runs-on: windows-latest
        steps:
        - name: Echo docker details
          run: docker info
        - name: Docker images
          run: docker run hello-world
    
